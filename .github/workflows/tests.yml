name: Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags: '*'

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.backend }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1'
          - '1.9'
          - 'pre'
        os:
          - ubuntu-latest
          - macOS-latest
          - windows-latest
        backend:
          - Pixi
        include:
          - version: '1'
            os: ubuntu-latest
            backend: System
          - version: '1'
            os: ubuntu-latest
            backend: 'Null'
          - version: '1'
            os: ubuntu-latest
            backend: MicroMamba
          - version: '1'
            os: ubuntu-latest
            backend: SystemPixi
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0
        if: ${{ matrix.backend == 'SystemPixi' }}
        with:
          run-install: false
      - uses: julia-actions/setup-julia@v3
        id: setup-julia
        with:
          version: ${{ matrix.version }}
      - id: should-skip
        run: echo "skip=${{ matrix.version == 'pre' && !contains(steps.setup-julia.outputs.julia-version, '-') }}" >> $GITHUB_OUTPUT
      - uses: julia-actions/cache@v3
        if: ${{ steps.should-skip.outputs.skip != 'true' }}
      - uses: julia-actions/julia-downgrade-compat@v1
        if: ${{ matrix.version == '1.9' }}
        with:
          skip: Markdown,Pkg,TOML,Aqua,Test,TestItemRunner,OpenSSL_jll
      - uses: julia-actions/julia-buildpkg@v1
        if: ${{ steps.should-skip.outputs.skip != 'true' }}
      - uses: julia-actions/julia-runtest@v1
        if: ${{ steps.should-skip.outputs.skip != 'true' }}
        env:
          JULIA_DEBUG: ${{ runner.debug == '1' && 'CondaPkg' || '' }}
          JULIA_CONDAPKG_BACKEND: ${{ matrix.backend }}
      - uses: julia-actions/julia-processcoverage@v1
        if: ${{ steps.should-skip.outputs.skip != 'true' }}
      - uses: codecov/codecov-action@v7
        if: ${{ steps.should-skip.outputs.skip != 'true' }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
